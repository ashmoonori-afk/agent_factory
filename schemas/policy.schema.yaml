$schema: "http://json-schema.org/draft-07/schema#"
title: "Policy"
description: "Schema for DENY/ASK/ALLOW policy rules"
type: object
required:
  - deny
properties:
  deny:
    type: array
    items:
      type: string
  ask:
    type: array
    items:
      type: string
  allow:
    type: array
    items:
      type: string
additionalProperties: false

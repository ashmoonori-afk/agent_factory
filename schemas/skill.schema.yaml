$schema: "http://json-schema.org/draft-07/schema#"
title: "Skill"
description: "Schema for skill metadata"
type: object
required:
  - id
  - name
  - policy
properties:
  id:
    type: string
    pattern: "^[a-z0-9-]+$"
  name:
    type: string
  description:
    type: string
  policy:
    type: string
    enum: ["DENY", "ASK", "ALLOW"]
additionalProperties: false

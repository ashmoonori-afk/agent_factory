scenarios:
  - id: skill-csv-reader
    description: "csv-reader skill file is generated"
    spec:
      name: skill-csv-agent
      description: test agent with csv-reader
      type: single
      skills: [csv-reader]
      persona: {tone: professional, language: en}
      policies: {deny: [], ask: [], allow: ["*"]}
    check:
      skill_file: skills/csv-reader.md
      claude_md_contains: ["csv-reader"]

